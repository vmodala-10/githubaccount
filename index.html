<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My EC2 Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #89f7fe, #66a6ff);
            color: #fff;
            text-align: center;
        }
        .container {
            margin-top: 15%;
        }
        h1 {
            font-size: 3rem;
        }
        p {
            font-size: 1.2rem;
        }
        .btn {
            padding: 10px 20px;
            background: white;
            color: #333;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Hello from EC2!</h1>
        <p>Your GitHub repo is successfully deployed. Now performing group 2 post connection tasks. Pipeline is now working. changes to pull from github to EC2 </p>
        <button class="btn" onclick="alert('You did it 🎉')">Click Me</button>
    </div>
</body>
</html>
